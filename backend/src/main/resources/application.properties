spring.application.name=smart-campus-connect

# Override DB credentials locally: copy application-local.properties.example → application-local.properties
spring.config.import=optional:classpath:application-local.properties

server.port=${SERVER_PORT:8080}

# Database connection should be provided via environment variables.
# Example values are in /env.example and application-local.properties.example
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
